<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>大海物語5 予想システム v5 — エクスアリーナ東京</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;
  --surface:#1e2330;--surface2:#252b3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#00d4ff;--gold:#f5c842;--green:#00e676;--orange:#ff9800;--red:#ff4444;
  --ev:#ffb300;--ev-bg:rgba(255,179,0,0.08);--ev-border:rgba(255,179,0,0.3);
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --fd:'Bebas Neue',sans-serif;--fb:'Noto Sans JP',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;}

.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:12px;}
.hdr-title{font-family:var(--fd);font-size:21px;letter-spacing:2px;color:var(--accent);white-space:nowrap;}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.hdr-center{display:flex;align-items:center;gap:8px;}
.today-chip{font-family:var(--fm);font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);white-space:nowrap;}
.today-chip.ev{background:var(--ev-bg);border-color:var(--ev-border);color:var(--ev);font-weight:600;}
.next-chip{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface);color:var(--text3);white-space:nowrap;}
.hdr-formula{font-family:var(--fm);font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:5px 10px;border-radius:6px;white-space:nowrap;}
.hdr-formula b{color:var(--accent);}

.main{display:flex;flex:1;height:calc(100vh - 54px);}

/* SIDEBAR */
.sidebar{width:215px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sb-sec{padding:14px 10px 6px;}
.sb-lbl{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:0 4px;margin-bottom:5px;}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:7px 9px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-family:var(--fb);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px;}
.nb:hover{background:var(--surface);color:var(--text);}
.nb.active{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2);}
.sb-div{height:1px;background:var(--border);margin:6px 10px;}
.day-nav{padding:6px 10px;}
.db{display:flex;align-items:center;justify-content:space-between;width:100%;padding:6px 9px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-family:var(--fb);font-size:12px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px;}
.db:hover{background:var(--surface);color:var(--text);}
.db.active{background:rgba(0,212,255,0.1);color:var(--accent);}
.db.ev-day{border-left:2px solid var(--ev);padding-left:7px;}
.db.ev-day .db-lbl{color:var(--ev);}
.db-badge{font-family:var(--fm);font-size:10px;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--text3);flex-shrink:0;}
.db.active .db-badge{background:rgba(0,212,255,0.15);color:var(--accent);}
.ev-dot{width:5px;height:5px;border-radius:50%;background:var(--ev);display:inline-block;margin-left:3px;vertical-align:middle;}

.content{flex:1;overflow-y:auto;padding:18px 22px;}

/* BANNERS */
.ev-banner{background:var(--ev-bg);border:1px solid var(--ev-border);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.ev-banner-icon{font-size:20px;}
.ev-banner-title{font-size:13px;font-weight:700;color:var(--ev);}
.ev-banner-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.info-banner{background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.18);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--accent);margin-bottom:14px;}
.warn-banner{background:rgba(255,179,0,0.06);border:1px solid var(--ev-border);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--ev);margin-bottom:14px;}

/* METRICS */
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.mc.ev{border-color:var(--ev-border);background:var(--ev-bg);}
.mc-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;}
.mc-val{font-family:var(--fm);font-size:20px;font-weight:600;color:var(--text);}
.mc-val.green{color:var(--green);}
.mc-val.accent{color:var(--accent);}
.mc-val.gold{color:var(--gold);}
.mc-val.ev{color:var(--ev);}

/* FILTER */
.fbar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.fb{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--fb);font-size:12px;cursor:pointer;transition:all .15s;}
.fb:hover{border-color:var(--accent);color:var(--text);}
.fb.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:500;}
.fb.ev-fb.active{background:var(--ev);border-color:var(--ev);}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg3);}
th{padding:9px 11px;text-align:right;font-weight:500;color:var(--text3);font-size:11px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
th:first-child{text-align:left;}
th:hover{color:var(--accent);}
td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);font-size:13px;}
td:first-child{text-align:left;}
tbody tr:hover td{background:rgba(255,255,255,0.02);}
tbody tr:last-child td{border-bottom:none;}
tr.rh td{background:rgba(0,230,118,0.04);}
tr.rw td{background:rgba(255,152,0,0.04);}
tr.rc td{background:rgba(255,68,68,0.03);}
tr.rev-row td{background:var(--ev-bg);}
tr.rev-row td:first-child{border-left:2px solid var(--ev);}
.dn{font-family:var(--fm);font-weight:600;font-size:13px;color:var(--text);background:var(--surface2);padding:2px 7px;border-radius:4px;display:inline-block;}
.dv{font-family:var(--fm);font-weight:600;font-size:14px;}
.dv.hot{color:var(--green);}.dv.warm{color:var(--orange);}.dv.cold{color:var(--red);}.dv.neutral{color:var(--text);}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;font-family:var(--fm);}
.bdg-s{background:rgba(255,68,68,0.15);color:#ff6b6b;border:1px solid rgba(255,68,68,0.3);}
.bdg-a{background:rgba(255,152,0,0.15);color:var(--orange);border:1px solid rgba(255,152,0,0.3);}
.bdg-b{background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.bdg-c{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.bdg-ev{background:var(--ev-bg);color:var(--ev);border:1px solid var(--ev-border);}
.mv{font-family:var(--fm);font-size:11px;padding:1px 4px;border-radius:3px;}
.mv.hot{background:rgba(0,230,118,0.12);color:var(--green);}
.mv.warm{background:rgba(255,152,0,0.1);color:var(--orange);}
.mv.cold{background:rgba(255,68,68,0.1);color:var(--red);}
.mv.neutral{color:var(--text2);}
.mv.em{outline:1px solid var(--ev-border);}

/* RANK */
.rg{display:flex;flex-direction:column;gap:9px;}
.rc2{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 18px;display:flex;align-items:flex-start;gap:14px;}
.rc2.rs{border-left:3px solid #ff4444;background:rgba(255,68,68,0.05);}
.rc2.ra{border-left:3px solid var(--orange);background:rgba(255,152,0,0.05);}
.rc2.rb{border-left:3px solid var(--green);background:rgba(0,230,118,0.05);}
.rno{font-family:var(--fd);font-size:30px;line-height:1;color:var(--text3);min-width:34px;}
.rc2.rs .rno{color:#ff4444;}.rc2.ra .rno{color:var(--orange);}.rc2.rb .rno{color:var(--green);}
.rb2{flex:1;}
.rhead{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.rdai{font-size:17px;font-weight:700;color:var(--text);font-family:var(--fm);}
.rreason{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:7px;}
.rstats{display:flex;gap:14px;flex-wrap:wrap;}
.rst{font-size:12px;color:var(--text3);}
.rst b{color:var(--text);font-weight:500;}
.rst b.g{color:var(--green);}.rst b.r{color:var(--red);}.rst b.e{color:var(--ev);}

/* ISLAND PREDICTION */
.isl-pred{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px;}
.isl-pred-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.isl-pred-card.rank1{border:2px solid var(--gold);background:rgba(245,200,66,0.05);}
.isl-pred-card.rank2{border:1px solid rgba(200,200,200,0.3);background:rgba(200,200,200,0.04);}
.isl-pred-card.rank3{border:1px solid rgba(180,100,40,0.4);background:rgba(180,100,40,0.04);}
.isl-pred-rank{font-family:var(--fd);font-size:40px;line-height:1;position:absolute;right:14px;top:10px;opacity:0.15;}
.isl-pred-card.rank1 .isl-pred-rank{color:var(--gold);opacity:0.25;}
.isl-pred-card.rank2 .isl-pred-rank{color:#ccc;opacity:0.2;}
.isl-pred-card.rank3 .isl-pred-rank{color:#b46428;opacity:0.2;}
.isl-pred-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
.isl-pred-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;}
.isl-pred-avg{font-family:var(--fm);font-size:22px;font-weight:600;margin-bottom:8px;}
.isl-pred-avg.hot{color:var(--green);}
.isl-pred-avg.warm{color:var(--orange);}
.isl-pred-avg.cold{color:var(--red);}
.isl-pred-avg.neutral{color:var(--text);}
.isl-pred-cells{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.isl-mini{width:52px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 4px;text-align:center;}
.isl-mini.hot{border-color:rgba(0,230,118,0.3);background:rgba(0,230,118,0.08);}
.isl-mini.warm{border-color:rgba(255,152,0,0.3);background:rgba(255,152,0,0.08);}
.isl-mini.cold{border-color:rgba(255,68,68,0.3);background:rgba(255,68,68,0.05);}
.isl-mini-num{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--text);}
.isl-mini.hot .isl-mini-num{color:var(--green);}
.isl-mini.warm .isl-mini-num{color:var(--orange);}
.isl-mini.cold .isl-mini-num{color:var(--red);}
.isl-mini-val{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--fm);}
.isl-mini.hot .isl-mini-val{color:var(--green);opacity:.8;}
.isl-mini.warm .isl-mini-val{color:var(--orange);opacity:.8;}
.isl-mini.cold .isl-mini-val{color:var(--red);opacity:.8;}
.isl-pred-reasons{font-size:11px;color:var(--text2);line-height:1.6;margin-top:6px;}
.isl-all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:16px;}
.isl-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
.isl-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.isl-card-title{font-size:13px;font-weight:500;color:var(--text);}
.isl-card-avg{font-family:var(--fm);font-size:12px;padding:2px 8px;border-radius:4px;}
.isl-card-avg.hot{background:rgba(0,230,118,0.15);color:var(--green);}
.isl-card-avg.warm{background:rgba(255,152,0,0.15);color:var(--orange);}
.isl-card-avg.cold{background:rgba(255,68,68,0.15);color:var(--red);}
.isl-card-avg.neutral{background:var(--surface2);color:var(--text2);}
.isl-rank-pip{font-family:var(--fm);font-size:10px;padding:1px 6px;border-radius:3px;}
.pip1{background:rgba(245,200,66,0.2);color:var(--gold);}
.pip2{background:rgba(200,200,200,0.15);color:#ccc;}
.pip3{background:rgba(180,100,40,0.2);color:#cd7f32;}

/* UPLOAD */
.up-panel{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:18px;margin-bottom:18px;}
.up-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.up-title .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.up-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.up-step{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;}
.step-n{font-family:var(--fd);font-size:22px;color:var(--accent);line-height:1;margin-bottom:3px;}
.step-l{font-size:11px;color:var(--text2);line-height:1.5;}
.step-l b{color:var(--text);}
.up-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.dg{display:flex;flex-direction:column;gap:3px;}
.dl{font-size:11px;color:var(--text3);}
.di{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;color:var(--text);font-family:var(--fm);font-size:13px;outline:none;}
.di:focus{border-color:var(--accent);}
.ev-ind{font-size:11px;margin-top:3px;height:15px;}
.ev-ind.yes{color:var(--ev);}
.ev-ind.no{color:var(--text3);}
.paste-zone{flex:1;min-width:220px;border:1.5px dashed var(--border2);border-radius:8px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .15s;outline:none;}
.paste-zone:focus,.paste-zone.focused{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,0.1);}
.paste-zone.has-img{border-color:var(--green);border-style:solid;}
.paste-zone.dragover{border-color:var(--accent);background:rgba(0,212,255,0.04);}
.pz-text{font-size:12px;color:var(--text2);pointer-events:none;}
.pz-text b{color:var(--accent);}
.pz-sub{font-size:11px;color:var(--text3);margin-top:3px;pointer-events:none;}
.trow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center;}
.tw2{position:relative;display:inline-block;}
.timg{width:60px;height:60px;border-radius:5px;object-fit:cover;border:1px solid var(--border);}
.tdel{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--red);border:none;color:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.btn-go{padding:9px 18px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;}
.btn-go:hover{background:#00b8d9;}
.btn-go:disabled{opacity:.35;cursor:not-allowed;}
.ast{font-size:12px;color:var(--text2);margin-top:7px;min-height:18px;}
.ast.ok{color:var(--green);}.ast.err{color:var(--red);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ak-sec{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.ak-lbl{font-size:12px;color:var(--text2);white-space:nowrap;}
.ak-inp{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none;}
.ak-inp:focus{border-color:var(--accent);}
.ak-note{font-size:11px;color:var(--text3);width:100%;}

.note{font-size:11px;color:var(--text3);margin-top:14px;line-height:1.7;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-ico{font-size:36px;margin-bottom:10px;}
.empty-txt{font-size:14px;color:var(--text2);margin-bottom:5px;}
.dm{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.bsm{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--fb);font-size:12px;cursor:pointer;transition:all .15s;}
.bsm:hover{border-color:var(--accent);color:var(--accent);}
.bsm.d:hover{border-color:var(--red);color:var(--red);}
.dc{font-size:11px;color:var(--text3);margin-left:auto;}
.sec-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* VERIFY */
.vfy-day-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.vfy-day-card.ev-day2{border-left:3px solid var(--ev);}
.vfy-day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.vfy-date{font-family:var(--fm);font-size:15px;font-weight:600;color:var(--text);}
.vfy-mode{font-size:11px;padding:2px 8px;border-radius:4px;}
.vfy-mode.ev{background:var(--ev-bg);color:var(--ev);border:1px solid var(--ev-border);}
.vfy-mode.norm{background:var(--surface2);color:var(--text3);}
.vfy-score-row{display:flex;gap:8px;align-items:center;margin-left:auto;}
.vfy-score{font-family:var(--fm);font-size:14px;font-weight:600;}
.vfy-score.s-hot{color:var(--green);}
.vfy-score.s-warm{color:var(--orange);}
.vfy-score.s-cold{color:var(--red);}
.vfy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.vfy-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;}
.vfy-block-title{font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.vfy-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.vfy-row:last-child{border-bottom:none;}
.vfy-row-left{display:flex;align-items:center;gap:6px;}
.vfy-rank{font-family:var(--fm);font-size:11px;color:var(--text3);min-width:24px;}
.vfy-name{color:var(--text);}
.vfy-result{display:flex;align-items:center;gap:6px;}
.vfy-dama{font-family:var(--fm);font-size:12px;}
.vfy-hit{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500;}
.vfy-hit.hit{background:rgba(0,230,118,0.15);color:var(--green);}
.vfy-hit.miss{background:rgba(255,68,68,0.1);color:var(--red);}
.vfy-hit.near{background:rgba(255,152,0,0.12);color:var(--orange);}
.vfy-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.vfy-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center;}
.vfy-sum-lbl{font-size:10px;color:var(--text3);margin-bottom:6px;}
.vfy-sum-val{font-family:var(--fm);font-size:22px;font-weight:600;}
.vfy-sum-val.green{color:var(--green);}.vfy-sum-val.orange{color:var(--orange);}.vfy-sum-val.accent{color:var(--accent);}
.acc-bar{height:6px;border-radius:3px;background:var(--surface2);margin-top:4px;overflow:hidden;}

// ===== DB (ローカルファイル永続化) =====
// API_BASE -> getApiBase()に移行
let DB=[];
let DB_LOADED=false;

async function loadDB(){
  var calcFn=MACHINE==='eva'?calcDamaEva:calcDamaDaikai;
  var src=MACHINE==='eva'?INIT_EVA:INIT;
  if(IS_MOBILE_MODE){
    var row=await readSupabase(MACHINE);
    if(row&&Array.isArray(row.data)&&row.data.length>0){DB=row.data;DB_LOADED=true;return;}
    DB=src.map(function(r){return Object.assign({},r,{差玉:calcFn(r.総,r.累,r.確,r.初)});});
    return;
  }
  try{
    var res=await fetch(getApiBase()+getMC().dataEp);
    if(res.ok){var data=await res.json();if(Array.isArray(data)&&data.length>0){DB=data;DB_LOADED=true;return;}}
  }catch(e){console.warn('[DB] Server not reachable');}
  DB=src.map(function(r){return Object.assign({},r,{差玉:calcFn(r.総,r.累,r.確,r.初)});});
  DB_LOADED=false;await saveDB();
}

async function saveDB(){
  try{
    await fetch(getApiBase()+getMC().dataEp,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)});
  }catch(e){console.warn('[DB] save failed');}
}

function clearDB(){if(confirm('全データを削除しますか？')){DB=[];saveDB().then(()=>render());}}
function resetDB(){
  if(confirm('初期データ（6日分）にリセットしますか？')){
    var calcFn=MACHINE==='eva'?calcDamaEva:calcDamaDaikai;
    var src=MACHINE==='eva'?INIT_EVA:INIT;
    DB=src.map(function(r){return Object.assign({},r,{差玉:calcFn(r.総,r.累,r.確,r.初)});});
    saveDB().then(function(){render();});
  }
}
function exportDB(){
  const csv=['\uFEFF日付,種別,台番号,総大当り,累計ST,確変,初当り,最大持玉,差玉推定',
    ...DB.map(r=>`${r.date},${isEv(r.date)?evTypeName(r.date):'通常'},${r.u},${r.総},${r.累},${r.確},${r.初},${r.最大},${r.差玉}`)
  ].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='daikai5.csv';a.click();
}
function getDates(){return[...new Set(DB.map(r=>r.date))].sort().reverse();}
function getByDate(d){return DB.filter(r=>r.date===d);}
function getRecent7(){const c=new Date();c.setDate(c.getDate()-7);return DB.filter(r=>new Date(r.date)>=c);}

// 検証対象外の台判定（累計ST500以下かつ大当り0回 = 未稼働・開店直後）
function isValidActual(r){return!(r.累<=500&&r.総===0);}

// ===== 島グループ定義 =====
// エヴァの固定島グループ定義（3台×6島）
const EVA_GROUPS=[
  {label:'427〜429番台',start:427,units:['427','428','429']},
  {label:'430〜432番台',start:430,units:['430','431','432']},
  {label:'433〜435番台',start:433,units:['433','434','435']},
  {label:'466〜468番台',start:466,units:['466','467','468']},
  {label:'469〜471番台',start:469,units:['469','470','471']},
  {label:'472〜474番台',start:472,units:['472','473','474']},
];

function buildGroups(units){
  // エヴァは固定グループを使用
  if(MACHINE==='eva'){
    var dbUnits=new Set(units);
    return EVA_GROUPS.map(function(g){
      var u=g.units.filter(function(u){return dbUnits.has(u);});
      return {label:g.label,start:g.start,units:u.length?u:g.units};
    });
  }
  const sorted=units.slice().sort((a,b)=>+a-+b);
  const mn=+sorted[0],mx=+sorted[sorted.length-1];
  const groups=[];
  for(let s=mn;s<=mx;s+=5){
    const us=sorted.filter(u=>+u>=s&&+u<s+5);
    if(us.length)groups.push({label:`${s}〜${s+4}番台`,start:s,units:us});
  }
  return groups;
}

// ===== 学習エンジン =====
const DEFAULT_W={
  avg:0.35,
  max:0.10,
  cnt10k:2500,
  rate10k:200,
  trend:0.30,
  hotY:8000,
  hotD2:3000,
  evMult:1.4,
  evBonus:4000,
};
let W={...DEFAULT_W};

async function loadWeights(){
  if(IS_MOBILE_MODE){
    var row=await readSupabase(MACHINE);
    W=row&&row.weights&&Object.keys(row.weights).length?Object.assign({},DEFAULT_W,row.weights):Object.assign({},DEFAULT_W);
    return;
  }
  try{
    var res=await fetch(getApiBase()+getMC().wEp);
    if(res.ok){var s=await res.json();if(s&&Object.keys(s).length>0)W=Object.assign({},DEFAULT_W,s);else W=Object.assign({},DEFAULT_W);}
  }catch(e){W=Object.assign({},DEFAULT_W);}
}
async function saveWeights(){
  try{await fetch(getApiBase()+getMC().wEp,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(W)});}catch(e){}
}
function resetWeights(){W={...DEFAULT_W};saveWeights();}

// 学習: 過去の「予想 vs 実績」から相関を計算して係数を更新
function learnWeights(){
  const dates=getDates();
  if(dates.length<3)return; // 最低3日分必要

  // 各日について「その日を除いた予想」の各指標と実績の相関を収集
  const samples=[]; // {avg,max,cnt10k,rate10k,trend,hotY,hotD2,evMult,isHit}
  dates.forEach(date=>{
    const actual=getByDate(date);
    if(!actual.length)return;
    const cutoff=new Date(date);cutoff.setDate(cutoff.getDate()-7);
    const hist=DB.filter(r=>r.date!==date&&new Date(r.date)>=cutoff&&new Date(r.date)<new Date(date));
    if(!hist.length)return;
    const units=[...new Set(hist.map(r=>r.u))];
    // 未稼働台を除外した実績マップ
    const actualMap={};actual.filter(isValidActual).forEach(r=>{actualMap[r.u]=r.差玉;});

    units.forEach(u=>{
      const rows=hist.filter(r=>r.u===u).sort((a,b)=>a.date.localeCompare(b.date));
      const vals=rows.map(r=>r.差玉);
      const evRows=rows.filter(r=>isEv(r.date));
      const normRows=rows.filter(r=>!isEv(r.date));
      const rawAvg=vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:0;
      const max=vals.length?Math.max(...vals):0;
      const cnt10k=vals.filter(v=>v>=10000).length;
      const rate10k=vals.length?cnt10k/vals.length*100:0;
      const n=rows.length;
      const recentAvg=n>=2?(rows[n-1].差玉+(rows[n-2]?.差玉||0))/2:rawAvg;
      const olderAvg=n>=3?rows.slice(0,Math.max(1,n-2)).reduce((s,r)=>s+r.差玉,0)/Math.max(1,n-2):rawAvg;
      const trend=recentAvg-olderAvg;
      const hotY=n>0&&rows[n-1].差玉>=10000?1:0;
      const hotD2=n>1&&rows[n-2].差玉>=10000?1:0;
      const evMult=evRows.length>0?1:0; // イベントデータありかどうか
      const actual=actualMap[u];
      if(actual==null)return;
      const isHit=actual>=10000?1:actual>=5000?0.5:0;
      samples.push({avg:rawAvg,max,cnt10k,rate10k,trend,hotY,hotD2,evMult,isHit,date,u});
    });
  });

  if(samples.length<10)return; // サンプル不足

  // 各指標とisHitのピアソン相関係数を計算
  function corr(key){
    const xs=samples.map(s=>s[key]);
    const ys=samples.map(s=>s.isHit);
    const mx=xs.reduce((a,b)=>a+b,0)/xs.length;
    const my=ys.reduce((a,b)=>a+b,0)/ys.length;
    const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
    const den=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0)*ys.reduce((s,y)=>s+(y-my)**2,0));
    return den===0?0:num/den;
  }

  const corrAvg=corr('avg');
  const corrMax=corr('max');
  const corrCnt10k=corr('cnt10k');
  const corrRate10k=corr('rate10k');
  const corrTrend=corr('trend');
  const corrHotY=corr('hotY');
  const corrHotD2=corr('hotD2');

  // 相関係数を0〜1に正規化してデフォルト係数に乗算（学習率0.3で緩やかに更新）
  const LR=0.3; // 学習率: 急激な変化を防ぐ
  function updateW(key,defVal,c,scale){
    const factor=Math.max(0.3,Math.min(2.5,1+(c*scale))); // 0.3〜2.5倍の範囲でクリップ
    const newVal=defVal*factor;
    W[key]=Math.round((W[key]*(1-LR)+newVal*LR)*1000)/1000;
  }

  updateW('avg',DEFAULT_W.avg,corrAvg,1.5);
  updateW('max',DEFAULT_W.max,corrMax,1.5);
  updateW('cnt10k',DEFAULT_W.cnt10k,corrCnt10k,1.5);
  updateW('rate10k',DEFAULT_W.rate10k,corrRate10k,1.5);
  updateW('trend',DEFAULT_W.trend,corrTrend,1.0);
  updateW('hotY',DEFAULT_W.hotY,corrHotY,1.5);
  updateW('hotD2',DEFAULT_W.hotD2,corrHotD2,1.5);

  // イベント日倍率の自動調整
  const evSamples=samples.filter(s=>s.evMult>0);
  const normSamples=samples.filter(s=>s.evMult===0);
  if(evSamples.length>=3&&normSamples.length>=3){
    const evHitRate=evSamples.reduce((s,r)=>s+r.isHit,0)/evSamples.length;
    const normHitRate=normSamples.reduce((s,r)=>s+r.isHit,0)/normSamples.length;
    if(normHitRate>0){
      const ratio=evHitRate/normHitRate;
      const newMult=Math.max(1.0,Math.min(2.5,ratio)); // 1.0〜2.5の範囲
      W.evMult=Math.round((W.evMult*(1-LR)+newMult*LR)*100)/100;
    }
  }

  saveWeights();
  return{corrAvg,corrMax,corrCnt10k,corrRate10k,corrTrend,corrHotY,corrHotD2,samples:samples.length};
}

// ===== 台統計（学習済み係数で計算） =====
function buildStats(overrideDB){
  const recent=overrideDB||getRecent7();
  const units=[...new Set(recent.map(r=>r.u))].sort((a,b)=>+a-+b);
  return units.map(u=>{
    const rows=recent.filter(r=>r.u===u).sort((a,b)=>a.date.localeCompare(b.date));
    const vals=rows.map(r=>r.差玉);
    const evRows=rows.filter(r=>isEv(r.date));
    const normRows=rows.filter(r=>!isEv(r.date));
    // 学習済みイベント倍率を使用
    const wSum=evRows.reduce((s,r)=>s+r.差玉*W.evMult,0)+normRows.reduce((s,r)=>s+r.差玉,0);
    const wCnt=evRows.length*W.evMult+normRows.length;
    const avg=wCnt>0?Math.round(wSum/wCnt):0;
    const max=vals.length?Math.max(...vals):0;
    const cnt10k=vals.filter(v=>v>=10000).length;
    const rate10k=vals.length?Math.round(cnt10k/vals.length*100):0;
    const evAvg=evRows.length?Math.round(evRows.reduce((s,r)=>s+r.差玉,0)/evRows.length):null;
    const normAvg=normRows.length?Math.round(normRows.reduce((s,r)=>s+r.差玉,0)/normRows.length):null;
    const n=rows.length;
    const recentAvg=n>=2?Math.round((rows[n-1].差玉+(rows[n-2]?.差玉||0))/2):avg;
    const olderAvg=n>=3?Math.round(rows.slice(0,Math.max(1,n-2)).reduce((s,r)=>s+r.差玉,0)/Math.max(1,n-2)):avg;
    const trend=recentAvg-olderAvg;
    const hotY=n>0&&rows[n-1].差玉>=10000;
    const hotD2=n>1&&rows[n-2].差玉>=10000;
    const evBonus=evRows.length>0&&evAvg!=null&&evAvg>5000?W.evBonus:0;
    // 学習済み係数でスコア計算
    const score=
      avg*W.avg+
      max*W.max+
      cnt10k*W.cnt10k+
      rate10k*W.rate10k+
      trend*W.trend+
      (hotY?W.hotY:0)+
      (hotD2?W.hotD2:0)+
      evBonus;
    return{u,avg,max,cnt10k,rate10k,evAvg,normAvg,evRows:evRows.length,trend,hotY,hotD2,score,rows,vals};
  }).sort((a,b)=>b.score-a.score);
}

// ===== 島統計 =====
function buildIslandStats(stats){
  const units=stats.map(s=>s.u);
  const groups=buildGroups(units);
  return groups.map(g=>{
    const gs=g.units.map(u=>stats.find(s=>s.u===u)).filter(Boolean);
    const avg=gs.length?Math.round(gs.reduce((s,st)=>s+st.avg,0)/gs.length):0;
    const max=gs.length?Math.max(...gs.map(st=>st.max)):0;
    const cnt10k=gs.reduce((s,st)=>s+st.cnt10k,0);
    const evAvg=gs.filter(st=>st.evAvg!=null).length?Math.round(gs.filter(st=>st.evAvg!=null).reduce((s,st)=>s+(st.evAvg||0),0)/gs.filter(st=>st.evAvg!=null).length):null;
    const trend=gs.length?Math.round(gs.reduce((s,st)=>s+st.trend,0)/gs.length):0;
    const hotYCnt=gs.filter(st=>st.hotY).length;
    // 学習済み係数で島スコア計算（台係数を流用してスケール調整）
    const score=
      avg*(W.avg*1.2)+
      max*(W.max*0.5)+
      cnt10k*(W.cnt10k*0.6)+
      trend*(W.trend)+
      (hotYCnt>=2?W.hotY*0.6:hotYCnt===1?W.hotY*0.25:0)+
      (evAvg!=null&&evAvg>5000?W.evBonus*0.75:0);
    const reasons=[];
    if(avg>=10000)reasons.push(`島平均+${Math.round(avg/1000)}k発の高出玉`);
    else if(avg>=5000)reasons.push(`島平均+${Math.round(avg/1000)}k発の安定プラス`);
    if(hotYCnt>=2)reasons.push(`${hotYCnt}台が直近好調（10k+）`);
    else if(hotYCnt===1)reasons.push('1台が直近10k+超えの好調');
    if(trend>3000)reasons.push(`島全体が上昇トレンド（+${Math.round(trend/1000)}k）`);
    if(evAvg!=null&&evAvg>5000)reasons.push(`イベント日平均+${Math.round(evAvg/1000)}k発の実績`);
    if(max>=20000)reasons.push(`最大+${Math.round(max/1000)}k発の爆発実績`);
    return{...g,gs,avg,max,cnt10k,evAvg,trend,hotYCnt,score,reasons};
  }).sort((a,b)=>b.score-a.score);
}

async function doAnalyze(){
  const valid=PB.filter(Boolean);if(!valid.length)return;
  if(!AK){setStatus('APIキーを入力してください','err');return;}
  document.getElementById('goBtn').disabled=true;
  const date=document.getElementById('tdate').value||todayStr();
  setStatus('<span class="spin"></span>AIが解析中...','');
  const content=valid.map(b64=>({type:'image',source:{type:'base64',media_type:'image/png',data:b64}}));
  content.push({type:'text',text:`これはパチンコホール「エクスアリーナ東京」のP大海物語５の遊技データ一覧画面です。
表の各行から以下の列を左から順に読み取り、JSON配列のみで返してください（説明・マークダウン不要）。
列順: 台番号, 現在スタート, 累計スタート, 総大当り, 最大持玉, 初当り, 確変当り, 7日間最高大当り回数, 大当り確率, 初当り確率
出力形式: [{"台番号":"556","累計スタート":895,"総大当り":3,"最大持玉":3250,"初当り":2,"確変当り":1}]
読み取れない値はnullにしてください。必ずJSON配列のみ返してください。`});
  try{
    const res=await fetch('http://localhost:5173/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content}]})});
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const raw=data.content.map(c=>c.text||'').join('');
    const m=raw.match(/\[[\s\S]*\]/);if(!m)throw new Error('JSONが見つかりませんでした');
    const parsed=JSON.parse(m[0]);
    let added=0;
    parsed.forEach(row=>{
      if(!row['台番号'])return;
      const 総=Number(row['総大当り'])||0,累=Number(row['累計スタート'])||0,確=Number(row['確変当り'])||0,初=Number(row['初当り'])||0,最大=Number(row['最大持玉'])||0;
      const entry={date,u:String(row['台番号']),総,累,確,初,最大,差玉:calcDama(総,累,確,初)};
      const dup=DB.find(r=>r.date===date&&r.u===entry.u);
      if(dup)Object.assign(dup,entry);else DB.push(entry);
      added++;
    });
    await saveDB();learnWeights();PB=[];
    const evStr=isEv(date)?`（🎯 ${evTypeName(date)}として記録）`:'';
    setStatus(`✓ ${added}台分を追加 (${date}) ${evStr}`,'ok');
    render();
  }catch(e){
    const msg=(e.message.includes('fetch')||e.message.includes('Failed')||e.message.includes('NetworkError'))
      ?'サーバー未起動です → install_and_run.bat（または start_server.bat）を先に実行してください'
      :'エラー: '+e.message;
    setStatus(msg,'err');
    document.getElementById('goBtn').disabled=false;
  }
}

// ===== 正解率検証 =====
// 「その日のデータを除いた過去データ」で予想を再現し、実績と比較する
function buildStatsExcluding(excludeDate){
  // excludeDate を除いた直近7日分で統計を組み直す
  const cutoff=new Date(excludeDate);cutoff.setDate(cutoff.getDate()-7);
  const recent=DB.filter(r=>r.date!==excludeDate&&new Date(r.date)>=cutoff&&new Date(r.date)<new Date(excludeDate));
  if(!recent.length)return{taiStats:[],islStats:[]};
  const units=[...new Set(recent.map(r=>r.u))].sort((a,b)=>+a-+b);
  const taiStats=units.map(u=>{
    const rows=recent.filter(r=>r.u===u).sort((a,b)=>a.date.localeCompare(b.date));
    const vals=rows.map(r=>r.差玉);
    const evRows=rows.filter(r=>isEv(r.date));
    const normRows=rows.filter(r=>!isEv(r.date));
    const wSum=evRows.reduce((s,r)=>s+r.差玉*W.evMult,0)+normRows.reduce((s,r)=>s+r.差玉,0);
    const wCnt=evRows.length*W.evMult+normRows.length;
    const avg=wCnt>0?Math.round(wSum/wCnt):0;
    const max=vals.length?Math.max(...vals):0;
    const cnt10k=vals.filter(v=>v>=10000).length;
    const rate10k=vals.length?Math.round(cnt10k/vals.length*100):0;
    const evAvg=evRows.length?Math.round(evRows.reduce((s,r)=>s+r.差玉,0)/evRows.length):null;
    const n=rows.length;
    const recentAvg=n>=2?Math.round((rows[n-1].差玉+(rows[n-2]?.差玉||0))/2):avg;
    const olderAvg=n>=3?Math.round(rows.slice(0,Math.max(1,n-2)).reduce((s,r)=>s+r.差玉,0)/Math.max(1,n-2)):avg;
    const trend=recentAvg-olderAvg;
    const hotY=n>0&&rows[n-1].差玉>=10000;
    const hotD2=n>1&&rows[n-2].差玉>=10000;
    const evBonus=evRows.length>0&&evAvg!=null&&evAvg>5000?W.evBonus:0;
    const score=avg*W.avg+max*W.max+cnt10k*W.cnt10k+rate10k*W.rate10k+trend*W.trend+(hotY?W.hotY:0)+(hotD2?W.hotD2:0)+evBonus;
    return{u,avg,max,cnt10k,rate10k,evAvg,trend,hotY,hotD2,score,vals};
  }).sort((a,b)=>b.score-a.score);
  const islStats=buildIslandStats(taiStats);
  return{taiStats,islStats};
}

function renderVerify(){
  const dates=getDates();

  // 学習係数パネル（常に表示）
  const isDefault=JSON.stringify(W)===JSON.stringify(DEFAULT_W);
  const wPanel=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
      <div style="font-size:13px;font-weight:500;color:var(--text);">🧠 学習済み係数</div>
      <div style="font-size:11px;padding:2px 8px;border-radius:4px;${isDefault?'background:var(--surface2);color:var(--text3);':'background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);'}">${isDefault?'初期値（学習前）':'自動学習済み'}</div>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="bsm" onclick="manualLearn()" style="font-size:11px;padding:4px 10px;">🔄 今すぐ再学習</button>
        <button class="bsm d" onclick="resetLearn()" style="font-size:11px;padding:4px 10px;">初期値に戻す</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;">
      ${[
        {lbl:'平均差玉 係数',key:'avg',def:DEFAULT_W.avg},
        {lbl:'最大差玉 係数',key:'max',def:DEFAULT_W.max},
        {lbl:'10k超え日数',key:'cnt10k',def:DEFAULT_W.cnt10k},
        {lbl:'10k超え率',key:'rate10k',def:DEFAULT_W.rate10k},
        {lbl:'トレンド 係数',key:'trend',def:DEFAULT_W.trend},
        {lbl:'直近好調ボーナス',key:'hotY',def:DEFAULT_W.hotY},
        {lbl:'2日前好調ボーナス',key:'hotD2',def:DEFAULT_W.hotD2},
        {lbl:'イベント倍率',key:'evMult',def:DEFAULT_W.evMult},
      ].map(({lbl,key,def})=>{
        const v=W[key];const changed=Math.abs(v-def)/Math.abs(def)>0.05;
        const diff=v-def;const sign=diff>=0?'+':'';
        return`<div style="background:var(--bg3);border:1px solid ${changed?'rgba(0,212,255,0.3)':'var(--border)'};border-radius:6px;padding:8px 10px;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px;">${lbl}</div>
          <div style="font-family:var(--fm);font-size:14px;font-weight:600;color:${changed?'var(--accent)':'var(--text)'};">${typeof v==='number'&&v>100?Math.round(v):v}</div>
          ${changed?`<div style="font-size:10px;color:var(--text3);margin-top:1px;">初期値: ${def} (${sign}${Math.round(diff*100)/100})</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:10px;">※ スクショを追加するたびに自動で再学習されます。データが蓄積されるほど精度が向上します。</div>
  </div>`;

  if(dates.length<2){
    return wPanel+`<div class="empty"><div class="empty-ico">✅</div><div class="empty-txt">データが2日分以上必要です</div><div style="font-size:12px;color:var(--text3);margin-top:8px;">スクショを追加するとここに正解率が表示されます</div></div>`;
  }

  // 各日の予想と実績を比較（直近7日分）
  const verifyDates=dates.slice(0,7); // 最新7日分
  let totalTaiHit=0,totalTaiNear=0,totalTaiTotal=0;
  let totalIslHit=0,totalIslNear=0,totalIslTotal=0;
  const dayResults=[];

  verifyDates.forEach(date=>{
    const actual=getByDate(date);
    if(!actual.length)return;
    const {taiStats,islStats}=buildStatsExcluding(date);
    if(!taiStats.length)return;

    // ===== 台予想 TOP5 vs 実績 =====
    const predTai=taiStats.slice(0,5);
    // 未稼働台（累計ST500以下かつ大当り0回）を除外した実績マップ
    const actualMap={};
    actual.filter(isValidActual).forEach(r=>{actualMap[r.u]=r.差玉;});

    const taiRows=predTai.map((s,i)=>{
      const actualDama=actualMap[s.u]!=null?actualMap[s.u]:null;
      let hitType='miss';
      if(actualDama!=null){
        if(actualDama>=10000)hitType='hit';
        else if(actualDama>=5000)hitType='near';
      }
      return{rank:i+1,u:s.u,predAvg:s.avg,actualDama,hitType};
    });

    const taiHit=taiRows.filter(r=>r.hitType==='hit').length;
    const taiNear=taiRows.filter(r=>r.hitType==='near').length;
    totalTaiHit+=taiHit;totalTaiNear+=taiNear;totalTaiTotal+=predTai.length;

    // ===== 島予想 TOP3 vs 実績 =====
    const predIsl=islStats.slice(0,3);
    const islRows=predIsl.map((g,i)=>{
      // 島の実績平均差玉
      const islActual=g.units.map(u=>actualMap[u]).filter(v=>v!=null);
      const islActualAvg=islActual.length?Math.round(islActual.reduce((s,v)=>s+v,0)/islActual.length):null;
      let hitType='miss';
      if(islActualAvg!=null){
        if(islActualAvg>=10000)hitType='hit';
        else if(islActualAvg>=5000)hitType='near';
      }
      return{rank:i+1,label:g.label,predAvg:g.avg,actualAvg:islActualAvg,hitType};
    });

    const islHit=islRows.filter(r=>r.hitType==='hit').length;
    const islNear=islRows.filter(r=>r.hitType==='near').length;
    totalIslHit+=islHit;totalIslNear+=islNear;totalIslTotal+=predIsl.length;

    // 日別スコア（ヒット=1点、ニアミス=0.5点）
    const taiScore=predTai.length>0?Math.round((taiHit+taiNear*0.5)/predTai.length*100):0;
    const islScore=predIsl.length>0?Math.round((islHit+islNear*0.5)/predIsl.length*100):0;

    dayResults.push({date,taiRows,islRows,taiHit,taiNear,islHit,islNear,taiScore,islScore,evDay:isEv(date)});
  });

  if(!dayResults.length){
    return`<div class="empty"><div class="empty-ico">✅</div><div class="empty-txt">比較できるデータが不足しています</div><div style="font-size:12px;color:var(--text3);margin-top:8px;">前日以前のデータが必要です</div></div>`;
  }

  // 総合スコア
  const overallTaiAcc=totalTaiTotal>0?Math.round((totalTaiHit+totalTaiNear*0.5)/totalTaiTotal*100):0;
  const overallIslAcc=totalIslTotal>0?Math.round((totalIslHit+totalIslNear*0.5)/totalIslTotal*100):0;
  const overallAcc=Math.round((overallTaiAcc+overallIslAcc)/2);
  const accColor=overallAcc>=60?'green':overallAcc>=40?'orange':'red';
  const barColor=overallAcc>=60?'g':overallAcc>=40?'o':'r';

  let html=wPanel+`
  <div class="warn-banner" style="font-size:12px;">
    ⚠️ 正解率の定義：予想TOP5台・TOP3島のうち <b style="color:var(--green);">実績10k+発 = ヒット</b>、<b style="color:var(--orange);">5k+発 = ニアミス</b>（0.5点）、それ未満 = ミス。「その日を除く過去データ」で予想を再現して実績と照合しています。
  </div>
  <div class="vfy-summary">
    <div class="vfy-sum-card"><div class="vfy-sum-lbl">総合正解率</div><div class="vfy-sum-val ${accColor}">${overallAcc}%</div><div class="acc-bar"><div class="acc-fill ${barColor}" style="width:${overallAcc}%"></div></div></div>
    <div class="vfy-sum-card"><div class="vfy-sum-lbl">台予想 正解率</div><div class="vfy-sum-val ${overallTaiAcc>=60?'green':overallTaiAcc>=40?'orange':'red'}">${overallTaiAcc}%</div><div class="acc-bar"><div class="acc-fill ${overallTaiAcc>=60?'g':overallTaiAcc>=40?'o':'r'}" style="width:${overallTaiAcc}%"></div></div></div>
    <div class="vfy-sum-card"><div class="vfy-sum-lbl">島予想 正解率</div><div class="vfy-sum-val ${overallIslAcc>=60?'green':overallIslAcc>=40?'orange':'red'}">${overallIslAcc}%</div><div class="acc-bar"><div class="acc-fill ${overallIslAcc>=60?'g':overallIslAcc>=40?'o':'r'}" style="width:${overallIslAcc}%"></div></div></div>
    <div class="vfy-sum-card"><div class="vfy-sum-lbl">検証日数</div><div class="vfy-sum-val accent">${dayResults.length}日</div></div>
  </div>`;

  // 日別カード
  dayResults.forEach(d=>{
    const ev=d.evDay;
    const tAcc=d.taiScore;
    const iAcc=d.islScore;
    const tColor=tAcc>=60?'s-hot':tAcc>=40?'s-warm':'s-cold';
    const iColor=iAcc>=60?'s-hot':iAcc>=40?'s-warm':'s-cold';

    html+=`<div class="vfy-day-card ${ev?'ev-day2':''}">
      <div class="vfy-day-hdr">
        <div class="vfy-date">${d.date}</div>
        <div class="vfy-mode ${ev?'ev':'norm'}">${ev?'🎯 '+evTypeName(d.date):'通常日'}</div>
        <div class="vfy-score-row">
          <span style="font-size:11px;color:var(--text3);">台:</span>
          <span class="vfy-score ${tColor}">${tAcc}%</span>
          <span style="font-size:11px;color:var(--text3);margin-left:8px;">島:</span>
          <span class="vfy-score ${iColor}">${iAcc}%</span>
        </div>
      </div>
      <div class="vfy-grid">
        <div class="vfy-block">
          <div class="vfy-block-title">🏆 台予想 TOP5 vs 実績</div>`;

    d.taiRows.forEach(r=>{
      const hitLbl=r.hitType==='hit'?'<span class="vfy-hit hit">ヒット</span>':r.hitType==='near'?'<span class="vfy-hit near">ニアミス</span>':'<span class="vfy-hit miss">ミス</span>';
      const actualStr=r.actualDama!=null?`<span class="vfy-dama ${dc(r.actualDama)}">${fmt(r.actualDama)}</span>`:'<span style="color:var(--text3);font-size:11px;">データなし</span>';
      html+=`<div class="vfy-row">
        <div class="vfy-row-left"><span class="vfy-rank">${r.rank}.</span><span class="vfy-name">台 ${r.u}</span></div>
        <div class="vfy-result">${actualStr}${hitLbl}</div>
      </div>`;
    });

    html+=`</div><div class="vfy-block">
          <div class="vfy-block-title">🏝 島予想 TOP3 vs 実績</div>`;

    d.islRows.forEach(r=>{
      const hitLbl=r.hitType==='hit'?'<span class="vfy-hit hit">ヒット</span>':r.hitType==='near'?'<span class="vfy-hit near">ニアミス</span>':'<span class="vfy-hit miss">ミス</span>';
      const actualStr=r.actualAvg!=null?`<span class="vfy-dama ${dc(r.actualAvg)}">${fmt(r.actualAvg)}</span>`:'<span style="color:var(--text3);font-size:11px;">データなし</span>';
      html+=`<div class="vfy-row">
        <div class="vfy-row-left"><span class="vfy-rank">${r.rank}.</span><span class="vfy-name" style="font-size:11px;">${r.label}</span></div>
        <div class="vfy-result">${actualStr}${hitLbl}</div>
      </div>`;
    });

    html+=`</div></div></div>`;
  });

  html+=`<p class="note">※ ヒット=実績差玉10,000発以上、ニアミス=5,000発以上（0.5点）。予想は「その日を除いた直近データ」で再現しています。データが蓄積されるほど精度が向上します。</p>`;
  return html;
}

async function onSaveApiKey(){
  const inp=document.getElementById('akInp');
  const key=inp?inp.value.trim():'';
  if(!key){alert('APIキーを入力してください');return;}
  AK=key;
  await saveApiKey(key);
  const msg=document.getElementById('akSaveMsg');
  if(msg){msg.textContent='✓ 保存しました！次回起動時から自動で読み込まれます';msg.style.color='var(--green)';}
  setTimeout(()=>{if(msg){msg.textContent='✓ APIキーは保存済みです（次回起動時も自動で読み込まれます）';msg.style.color='var(--text3)';}},3000);
}

function manualLearn(){
  const result=learnWeights();
  if(result&&result.samples>=10){
    render();
  } else {
    alert('学習に必要なサンプルが不足しています（10件以上必要）。データをさらに追加してください。');
  }
}
function resetLearn(){
  if(confirm('係数を初期値に戻しますか？')){resetWeights();render();}
}

function previewRetire(){
  var fromEl=document.getElementById('retireFrom');
  var toEl=document.getElementById('retireTo');
  var prev=document.getElementById('retirePreview');
  if(!fromEl||!toEl||!prev) return;
  var from=parseInt(fromEl.value);
  var to=parseInt(toEl.value);
  if(isNaN(from)||isNaN(to)){prev.textContent='台番号を入力してください';return;}
  if(from>to){prev.textContent='開始台番号は終了台番号以下にしてください';return;}
  var targets=[...new Set(DB.map(function(r){return r.u;}))].filter(function(u){return +u>=from&&+u<=to;}).sort(function(a,b){return +a-+b;});
  var records=DB.filter(function(r){return +r.u>=from&&+r.u<=to;}).length;
  if(!targets.length){
    prev.innerHTML='<span style="color:var(--text3);">該当台番号はありません</span>';
  } else {
    prev.innerHTML='削除対象: <b style="color:var(--red);">'+targets.join('、')+'</b>（'+targets.length+'台 / '+records+'レコード）';
  }
  document.querySelectorAll('[id^="rchip"]').forEach(function(el){
    var u=el.id.replace('rchip','');
    var hit=+u>=from&&+u<=to;
    el.style.background=hit?'rgba(255,50,50,0.2)':'var(--surface2)';
    el.style.borderColor=hit?'var(--red)':'var(--border)';
    el.style.color=hit?'var(--red)':'var(--text2)';
  });
}

function previewRetireList(){
  var ta=document.getElementById('retireList');
  var prev=document.getElementById('retireListPreview');
  if(!ta||!prev) return;
  var targets=ta.value.split(',').map(function(s){return s.trim();}).filter(function(s){return s&&!isNaN(+s);});
  var inDB=targets.filter(function(u){return DB.some(function(r){return r.u===u;});});
  var records=DB.filter(function(r){return targets.indexOf(r.u)>=0;}).length;
  prev.textContent=inDB.length?'削除対象: '+inDB.join('、')+'（'+inDB.length+'台 / '+records+'レコード）':'該当台なし';
}

function execRetire(){
  var fromEl=document.getElementById('retireFrom');
  var toEl=document.getElementById('retireTo');
  if(!fromEl||!toEl){alert('入力欄が見つかりません');return;}
  var from=parseInt(fromEl.value);
  var to=parseInt(toEl.value);
  if(isNaN(from)||isNaN(to)||from>to){alert('台番号の範囲を正しく入力してください');return;}
  var targets=[...new Set(DB.map(function(r){return r.u;}))].filter(function(u){return +u>=from&&+u<=to;});
  if(!targets.length){alert('該当する台番号がありません（'+from+'〜'+to+'）');return;}
  var records=DB.filter(function(r){return +r.u>=from&&+r.u<=to;}).length;
  if(!confirm('台'+from+'〜'+to+'（'+targets.length+'台・'+records+'レコード）を削除します。元に戻せません。')) return;
  var before=DB.length;
  DB=DB.filter(function(r){return +r.u<from||+r.u>to;});
  saveDB().then(function(){learnWeights();alert('削除完了！'+(before-DB.length)+'レコード削除しました。');CV='rank';render();});
}

function execRetireList(){
  var ta=document.getElementById('retireList');
  if(!ta){alert('入力欄が見つかりません');return;}
  var targets=ta.value.split(',').map(function(s){return s.trim();}).filter(function(s){return s&&!isNaN(+s);});
  if(!targets.length){alert('台番号を入力してください');return;}
  var inDB=targets.filter(function(u){return DB.some(function(r){return r.u===u;});});
  if(!inDB.length){alert('該当する台番号がありません');return;}
  var records=DB.filter(function(r){return targets.indexOf(r.u)>=0;}).length;
  if(!confirm(inDB.join('、')+'（'+inDB.length+'台・'+records+'レコード）を削除します。元に戻せません。')) return;
  var before=DB.length;
  DB=DB.filter(function(r){return targets.indexOf(r.u)<0;});
  saveDB().then(function(){learnWeights();alert('削除完了！'+(before-DB.length)+'レコード削除しました。');CV='rank';render();});
}
// ===== モバイル対応 =====
function isMobile(){ return window.innerWidth <= 768; }

function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var icon=document.getElementById('hamburgerIcon');
  var lbl=document.getElementById('hamburgerLabel');
  if(!sb) return;
  sb.classList.toggle('open');
  var isOpen=sb.classList.contains('open');
  if(icon) icon.textContent=isOpen?'✕':'☰';
  if(lbl) lbl.textContent=isOpen?'閉じる':'メニュー・日付選択';
}

function initMobile(){
  var hb=document.getElementById('hamburger');
  if(isMobile()&&hb) hb.style.display='flex';
  window.addEventListener('resize',function(){
    var hb=document.getElementById('hamburger');
    var sb=document.getElementById('sidebar');
    if(!hb||!sb) return;
    if(isMobile()){ hb.style.display='flex'; }
    else{ hb.style.display='none'; sb.classList.remove('open'); }
  });
}

// スマホモード切替バナーの更新
function updateMobileBanner(){
  var banner=document.getElementById('mobileBanner');
  var check=document.getElementById('mobileBannerCheck');
  var label=document.getElementById('mobileBannerLabel');
  var slider=document.getElementById('mobileBannerSlider');
  var dot=document.getElementById('mobileBannerDot');
  if(!banner) return;
  banner.style.display='flex';
  if(check) check.checked=IS_MOBILE_MODE;
  if(label) label.textContent=IS_MOBILE_MODE?'ON（Supabase読込中）':'OFF（ローカルサーバー）';
  if(slider) slider.style.background=IS_MOBILE_MODE?'var(--ev)':'var(--surface2)';
  if(dot) dot.style.transform=IS_MOBILE_MODE?'translateX(18px)':'translateX(0)';
}

function toggleMobileMode(enabled){
  IS_MOBILE_MODE=enabled;
  localStorage.setItem('mobile_mode',enabled?'1':'0');
  updateMobileBanner();
  loadDB().then(function(){loadWeights().then(function(){learnWeights();render();});});
}

// ===== 機種切替 =====
function switchMachine(id, btn){
  MACHINE = id;
  document.querySelectorAll('.mt-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  var mc = getMC();
  var ht = document.getElementById('hdrTitle');
  var hf = document.getElementById('hdrFormula');
  if(ht) ht.textContent = mc.name + ' 予想システム';
  if(hf) hf.innerHTML = mc.formula;
  CV='rank'; CD=null; FM='all'; SK2='差玉'; SA=false;
  loadDB().then(function(){
    loadWeights().then(function(){ learnWeights(); render(); });
  });
}


// ===== 台詳細モーダル =====
function showTaiDetail(u){
  var rows=DB.filter(function(r){return r.u===u;}).sort(function(a,b){return a.date<b.date?-1:1;});
  if(!rows.length){alert('データがありません');return;}
  var vals=rows.map(function(r){return r.差玉;});
  var avg=Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length);
  var maxV=Math.max.apply(null,vals);
  var cnt10k=vals.filter(function(v){return v>=10000;}).length;
  var recent=rows.slice(-3);
  var trend=recent.length>=2?Math.round((recent[recent.length-1].差玉-recent[0].差玉)/(recent.length-1)):0;
  var maxAbs=Math.max.apply(null,vals.map(function(v){return Math.abs(v);}));
  if(maxAbs===0)maxAbs=1;

  document.getElementById('taiModalTitle').textContent='台 '+u+' の履歴';

  var trendCol=trend>0?'var(--green)':trend<0?'var(--red)':'var(--text2)';
  var trendMark=trend>0?'↑':trend<0?'↓':'→';
  var WEEKDAY=['日','月','火','水','木','金','土'];

  var h='';
  h+='<div class="modal-stat-row">';
  h+='<div class="modal-stat"><div class="modal-stat-lbl">加重平均</div><div class="modal-stat-val '+dc(avg)+'">'+fmt(avg)+'</div></div>';
  h+='<div class="modal-stat"><div class="modal-stat-lbl">最高差玉</div><div class="modal-stat-val hot">'+fmt(maxV)+'</div></div>';
  h+='<div class="modal-stat"><div class="modal-stat-lbl">10k超え</div><div class="modal-stat-val">'+cnt10k+'/'+rows.length+'日</div></div>';
  h+='</div>';

  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;">';
  h+='<span style="font-size:11px;color:var(--text3);">直近トレンド</span>';
  h+='<span style="font-family:var(--fm);font-size:15px;font-weight:600;color:'+trendCol+';">'+trendMark+' '+fmt(trend)+'/日</span>';
  h+='<span style="font-size:11px;color:var(--text3);margin-left:auto;">直近'+recent.length+'日の変化</span>';
  h+='</div>';

  h+='<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">日別差玉履歴</div>';
  rows.slice().reverse().forEach(function(r){
    var w=Math.min(100,Math.round(Math.abs(r.差玉)/maxAbs*100));
    var cls=dc(r.差玉);
    var dateShort=r.date.slice(5);
    var dow=WEEKDAY[new Date(r.date).getDay()];
    var evMark=isEv(r.date)?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ev);flex-shrink:0;margin-right:2px;"></span>':'<span style="width:8px;flex-shrink:0;display:inline-block;"></span>';
    h+='<div class="bar-row">';
    h+='<div class="bar-date">'+dateShort+'<span style="color:var(--text3);font-size:9px;">('+dow+')</span></div>';
    h+=evMark;
    h+='<div class="bar-wrap">';
    if(r.差玉>=0){
      h+='<div class="bar-pos" style="width:'+w+'%;background:'+(cls==='hot'?'var(--green)':cls==='warm'?'var(--orange)':'var(--text3)')+'"></div>';
    } else {
      h+='<div class="bar-neg" style="width:'+w+'%;background:var(--red);"></div>';
    }
    h+='</div>';
    h+='<div class="bar-val '+cls+'">'+fmt(r.差玉)+'</div>';
    h+='</div>';
  });
  h+='<div style="font-size:10px;color:var(--text3);margin-top:8px;">🟢 = イベント日</div>';

  document.getElementById('taiModalContent').innerHTML=h;
  document.getElementById('taiModal').style.display='flex';
}

function closeTaiModal(){
  document.getElementById('taiModal').style.display='none';
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTaiModal();});

// 起動時の非同期初期化
(async()=>{
  // GitHub Pages環境では自動的にスマホモードON
  var isGHP=window.location.hostname.includes('github.io');
  if(isGHP){ IS_MOBILE_MODE=true; localStorage.setItem('mobile_mode','1'); }

  await loadDB();
  await loadWeights();
  await loadApiKey();
  learnWeights();
  initPaste();
  initMobile();
  updateMobileBanner();
  render();
})();
